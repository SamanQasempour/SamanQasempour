<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">

  <rect width="1000" height="420" fill="#0D1117"/>

  <text x="40" y="60"
        fill="#58A6FF"
        font-size="32"
        font-family="Arial"
        font-weight="bold">
    DevOps Philosophy
  </text>

  <text x="40" y="95"
        fill="#8B949E"
        font-size="16"
        font-family="Arial">
    Learn • Code • Automate • Deploy • Monitor • Optimize • Repeat
  </text>

  <!-- Main Line -->
  <line x1="120" y1="220" x2="880" y2="220"
        stroke="#30363D"
        stroke-width="6"/>

  <!-- Animated Pulse -->
  <circle r="8" fill="#58A6FF">
    <animateMotion
      dur="5s"
      repeatCount="indefinite"
      path="M120 220 L880 220"/>
  </circle>

  <!-- Learn -->
  <circle cx="120" cy="220" r="32"
          fill="#161B22"
          stroke="#3FB950"
          stroke-width="3"/>

  <text x="120" y="226"
        fill="#3FB950"
        font-size="15"
        text-anchor="middle"
        font-family="Arial">
    Learn
  </text>

  <!-- Code -->
  <circle cx="245" cy="220" r="32"
          fill="#161B22"
          stroke="#58A6FF"
          stroke-width="3"/>

  <text x="245" y="226"
        fill="#58A6FF"
        font-size="15"
        text-anchor="middle"
        font-family="Arial">
    Code
  </text>

  <!-- Automate -->
  <circle cx="370" cy="220" r="32"
          fill="#161B22"
          stroke="#D29922"
          stroke-width="3"/>

  <text x="370" y="226"
        fill="#D29922"
        font-size="12"
        text-anchor="middle"
        font-family="Arial">
    Automate
  </text>

  <!-- Deploy -->
  <circle cx="495" cy="220" r="32"
          fill="#161B22"
          stroke="#A371F7"
          stroke-width="3"/>

  <text x="495" y="226"
        fill="#A371F7"
        font-size="15"
        text-anchor="middle"
        font-family="Arial">
    Deploy
  </text>

  <!-- Monitor -->
  <circle cx="620" cy="220" r="32"
          fill="#161B22"
          stroke="#F85149"
          stroke-width="3"/>

  <text x="620" y="226"
        fill="#F85149"
        font-size="12"
        text-anchor="middle"
        font-family="Arial">
    Monitor
  </text>

  <!-- Optimize -->
  <circle cx="745" cy="220" r="32"
          fill="#161B22"
          stroke="#FFA657"
          stroke-width="3"/>

  <text x="745" y="226"
        fill="#FFA657"
        font-size="12"
        text-anchor="middle"
        font-family="Arial">
    Optimize
  </text>

  <!-- Repeat -->
  <circle cx="870" cy="220" r="32"
          fill="#161B22"
          stroke="#3FB950"
          stroke-width="3"/>

  <text x="870" y="226"
        fill="#3FB950"
        font-size="15"
        text-anchor="middle"
        font-family="Arial">
    Repeat
  </text>

</svg>
